name: Plugin CI

on:
  push:
    branches:
      - main
      - release-*
  pull_request:
  workflow_dispatch:

jobs:
  build-plugin:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" `
            -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath dalamud-dist

      - name: Restore
        run: dotnet restore XIVDashPlugin/XIVDashPlugin.csproj

      - name: Build
        shell: pwsh
        run: |
          $libPath = "${{ github.workspace }}\dalamud-dist\"
          dotnet build XIVDashPlugin/XIVDashPlugin.csproj `
            -c Release `
            --no-restore `
            -p:DalamudLibPath="$libPath" `
            -p:IsCI=true

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: XIVPathPlugin-ci
          path: XIVDashPlugin/bin/Release/net10.0-windows/*

      - name: Validate plugin manifest version against repo.json
        shell: pwsh
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          manifest = json.loads(pathlib.Path("XIVDashPlugin/XIVPathPlugin.json").read_text(encoding="utf-8"))
          repo = json.loads(pathlib.Path("repo.json").read_text(encoding="utf-8"))

          entry = next((x for x in repo if x.get("InternalName") == "XIVPathPlugin"), None)
          if entry is None:
            print("ERROR: XIVPathPlugin entry missing in repo.json", file=sys.stderr)
            sys.exit(1)

          if entry.get("AssemblyVersion") != manifest.get("AssemblyVersion"):
            print(
              f"ERROR: repo.json AssemblyVersion={entry.get('AssemblyVersion')} != manifest AssemblyVersion={manifest.get('AssemblyVersion')}",
              file=sys.stderr,
            )
            sys.exit(1)

          print("repo.json and XIVPathPlugin.json versions are aligned")
          PY
