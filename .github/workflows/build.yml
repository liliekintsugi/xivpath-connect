name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip" `
            -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath dalamud-dist

      - name: Restore
        run: dotnet restore XIVDashPlugin/XIVDashPlugin.csproj

      - name: Build
        shell: pwsh
        run: |
          $libPath = "${{ github.workspace }}\dalamud-dist\"
          dotnet build XIVDashPlugin/XIVDashPlugin.csproj `
            -c Release `
            --no-restore `
            -p:DalamudLibPath="$libPath" `
            -p:IsCI=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XIVDashPlugin
          path: XIVDashPlugin/bin/Release/net8.0-windows/XIVDashPlugin/

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: XIVDashPlugin/bin/Release/net8.0-windows/XIVDashPlugin/*
          generate_release_notes: true
