name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" `
            -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath dalamud-dist

      - name: Restore
        run: dotnet restore XIVDashPlugin/XIVDashPlugin.csproj

      - name: Build
        shell: pwsh
        run: |
          $libPath = "${{ github.workspace }}\dalamud-dist\"
          dotnet build XIVDashPlugin/XIVDashPlugin.csproj `
            -c Release `
            --no-restore `
            -p:DalamudLibPath="$libPath" `
            -p:IsCI=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XIVDashPlugin
          path: XIVDashPlugin/bin/Release/net10.0-windows/XIVDashPlugin/

      - name: Update repo.json
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          python3 -c "
          import json, time
          with open('XIVDashPlugin/bin/Release/net10.0-windows/XIVDashPlugin/XIVDashPlugin.json') as f:
              manifest = json.load(f)
          with open('repo.json') as f:
              repo = json.load(f)
          if not isinstance(repo, list):
              repo = [repo]
          repo[0]['AssemblyVersion'] = manifest['AssemblyVersion']
          repo[0]['LastUpdate'] = int(time.time())
          with open('repo.json', 'w', encoding='utf-8') as f:
              json.dump(repo, f, indent=2, ensure_ascii=False)
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git commit -m "chore: update repo.json for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            XIVDashPlugin/bin/Release/net10.0-windows/XIVDashPlugin/*
            repo.json
          generate_release_notes: true
